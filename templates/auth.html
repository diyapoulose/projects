<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FitBot Pro</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
.lp { min-height:100vh; background:var(--cream); display:flex; flex-direction:column; overflow:hidden; position:relative; }

/* Big diagonal stripe */
.lp-stripe {
  position:absolute; top:-60px; right:-80px;
  width:420px; height:120vh; background:var(--ink);
  transform:rotate(-8deg); z-index:0;
}
.lp-stripe2 {
  position:absolute; top:-60px; right:-20px;
  width:420px; height:120vh; background:var(--amber);
  transform:rotate(-8deg); z-index:0; opacity:0.18;
}

.lp-content { position:relative; z-index:1; display:flex; flex-direction:column; height:100vh; padding:36px 28px; }

.lp-top { display:flex; align-items:center; gap:10px; margin-bottom:auto; }
.lp-logo {
  width:44px; height:44px; background:var(--amber);
  border:2px solid var(--ink); border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:3px 3px 0 var(--amber-dk);
}
.lp-logo svg { width:22px; height:22px; fill:var(--ink); }
.lp-wordmark { font-family:'Barlow Condensed',sans-serif; font-size:1.4rem; font-weight:900; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink); }

.lp-hero { flex:1; display:flex; flex-direction:column; justify-content:center; }
.lp-hero h1 {
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(3.5rem,12vw,6rem); font-weight:900;
  line-height:0.88; text-transform:uppercase; letter-spacing:-0.01em;
  color:var(--ink); margin-bottom:20px;
}
.lp-hero h1 span { color:var(--amber); display:block; }

.lp-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:36px; }
.lp-tag {
  background:var(--ink); color:var(--cream);
  font-family:'Barlow Condensed',sans-serif; font-size:0.75rem; font-weight:800;
  text-transform:uppercase; letter-spacing:0.1em;
  padding:4px 12px; border-radius:2px;
}
.lp-tag.amber { background:var(--amber); color:var(--ink); }

.lp-btns { display:flex; flex-direction:column; gap:10px; max-width:320px; }

/* Decorative stat boxes */
.lp-stats { display:flex; gap:10px; margin-bottom:28px; }
.lp-stat {
  background:var(--cream2); border:2px solid var(--ink); border-radius:8px;
  padding:12px 14px; box-shadow:3px 3px 0 var(--ink);
}
.lp-stat .n { font-family:'Barlow Condensed',sans-serif; font-size:1.6rem; font-weight:900; color:var(--ink); line-height:1; }
.lp-stat .l { font-family:'Barlow Condensed',sans-serif; font-size:0.6rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-top:2px; }
</style>
</head>
<body>
<script>(function(){const v=localStorage.getItem('fitbot-dark');if(v==='1')document.documentElement.classList.add('dark');})();</script>
<div class="lp">
  <div class="lp-stripe"></div>
  <div class="lp-stripe2"></div>
  <div class="lp-content">
    <div class="lp-top">
      <div class="lp-logo">
        <svg viewBox="0 0 24 24"><path d="M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3C14.8 12 16.8 13 19 13v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 8.3V13h2V9.6l1.8-.7z"/></svg>
      </div>
      <span class="lp-wordmark">FitBot Pro</span>
    </div>
    <div class="lp-hero">
      <h1>Train<span>Smarter.</span></h1>
      <div class="lp-stats">
        <div class="lp-stat"><div class="n">50+</div><div class="l">Workouts</div></div>
        <div class="lp-stat"><div class="n">XP</div><div class="l">System</div></div>
        <div class="lp-stat"><div class="n">AI</div><div class="l">Coaching</div></div>
      </div>
      <div class="lp-tags">
        <span class="lp-tag amber">Free</span>
        <span class="lp-tag">Workouts</span>
        <span class="lp-tag">Diet</span>
        <span class="lp-tag">Running</span>
        <span class="lp-tag">Streaks</span>
      </div>
      <div class="lp-btns">
        <a href="/register" class="btn btn-amber btn-full" style="padding:16px;font-size:1.1rem;">Get Started — Free</a>
        <a href="/login" class="btn btn-ghost btn-full" style="padding:14px;">Sign In</a>
        <a href="/google/login" class="btn btn-ghost btn-full" style="padding:13px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:0.85rem;">
          <svg width="15" height="15" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </a>
      </div>
    </div>
  </div>
</div>
</body></html>
