<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FitBot — Create Account</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head>
<body>
<script>(function(){const v=localStorage.getItem('fitbot-dark');if(v==='1')document.documentElement.classList.add('dark');})();</script>
<a href="/" class="back-btn">&#8592;</a>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="logo-mark">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3C14.8 12 16.8 13 19 13v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 8.3V13h2V9.6l1.8-.7z"/></svg></div>
      <span>FitBot</span>
    </div>
    <h2 style="margin-bottom:4px;">Join the Squad</h2>
    <p style="margin-bottom:22px;">Start your fitness journey today.</p>
    {% if error %}<div style="background:var(--coral-bg);border:2px solid var(--coral);border-radius:var(--r-sm);padding:10px 13px;color:var(--coral);font-size:0.82rem;font-weight:500;margin-bottom:16px;box-shadow:2px 2px 0 #a03020;">{{ error }}</div>{% endif %}
    <div id="client-error" style="display:none;background:var(--coral-bg);border:2px solid var(--coral);border-radius:var(--r-sm);padding:10px 13px;color:var(--coral);font-size:0.82rem;font-weight:500;margin-bottom:16px;box-shadow:2px 2px 0 #a03020;"></div>
    <form action="/register" method="POST" id="reg-form">
      <label>Email</label><input type="text" name="email" id="reg-email" placeholder="you@example.com">
      <label>Password</label><input type="password" name="password" placeholder="Create a password" required style="margin-bottom:22px;">
      <button type="submit" class="btn btn-amber btn-full" style="padding:14px;">Create Account</button>
    </form>
    <div class="divider">or</div>
    <a href="/google/login" class="btn btn-ghost btn-full" style="padding:13px;display:flex;align-items:center;justify-content:center;gap:8px;">
      <svg width="15" height="15" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </a>
    <p style="text-align:center;font-size:0.78rem;color:var(--muted);margin-top:16px;">Already training? <a href="/login" style="color:var(--amber-dk);font-weight:700;">Sign In</a></p>
  </div>
</div>
<script>
document.getElementById('reg-form').addEventListener('submit', function(e) {
  const email = document.getElementById('reg-email').value.trim();
  const errBox = document.getElementById('client-error');
  if (!email.includes('@') || email.indexOf('@') === 0) {
    e.preventDefault(); errBox.textContent = 'Invalid email — must contain @ (e.g. you@example.com).'; errBox.style.display = 'block'; return;
  }
  const afterAt = email.split('@')[1];
  if (!afterAt || !afterAt.includes('.') || afterAt.startsWith('.') || afterAt.endsWith('.')) {
    e.preventDefault(); errBox.textContent = 'Invalid email domain (e.g. you@example.com).'; errBox.style.display = 'block'; return;
  }
  errBox.style.display = 'none';
});
</script>
</body></html>
